<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="GOST Panel">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="96" height="96" rx="22" fill="url(#bg)"/>
  <rect width="96" height="96" rx="22" fill="url(#shine)"/>
  <!-- Shield / panel icon -->
  <path d="M48 16 L72 26 L72 46 C72 62 62 74 48 80 C34 74 24 62 24 46 L24 26 Z"
        fill="none" stroke="white" stroke-width="3" stroke-linejoin="round" opacity="0.9"/>
  <!-- Inner network nodes -->
  <circle cx="48" cy="38" r="4" fill="white" opacity="0.95"/>
  <circle cx="36" cy="54" r="3.5" fill="white" opacity="0.85"/>
  <circle cx="60" cy="54" r="3.5" fill="white" opacity="0.85"/>
  <!-- Connection lines -->
  <line x1="48" y1="42" x2="37" y2="51" stroke="white" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="48" y1="42" x2="59" y2="51" stroke="white" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="39" y1="55" x2="57" y2="55" stroke="white" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <!-- Small dot at bottom (data flow indicator) -->
  <circle cx="48" cy="66" r="2.5" fill="white" opacity="0.7"/>
  <line x1="48" y1="62" x2="48" y2="58" stroke="white" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
</svg>
