# golangci-lint 配置文件
# 文档: https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor
    - web/node_modules
  skip-files:
    - ".*\\.pb\\.go$"

linters:
  enable:
    - errcheck      # 检查未处理的错误
    - gosimple      # 简化代码建议
    - govet         # Go 官方静态分析工具
    - ineffassign   # 检测无效赋值
    - staticcheck   # 静态分析检查
    - unused        # 检测未使用的常量、变量、函数等
    - gofmt         # 检查代码格式
    - goimports     # 检查 import 顺序
    - misspell      # 检查拼写错误
    - unconvert     # 检测不必要的类型转换
    - unparam       # 检测未使用的函数参数
    - gosec         # 安全检查
    - bodyclose     # 检查 HTTP response body 是否关闭
    - noctx         # 检查 HTTP 请求是否使用 context
    - sqlclosecheck # 检查 SQL rows/stmt 是否关闭
    - rowserrcheck  # 检查 SQL rows.Err() 是否检查
    - exportloopref # 检查循环变量引用问题
    - gocritic      # 代码质量检查
    - revive        # 快速、可配置的 Go linter
    - stylecheck    # 代码风格检查

  disable:
    - typecheck     # 类型检查（由编译器完成）
    - deadcode      # 已废弃
    - structcheck   # 已废弃
    - varcheck      # 已废弃

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - (*database/sql.DB).Close
      - (*database/sql.Rows).Close

  govet:
    check-shadowing: true
    enable-all: true

  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/supernaga/gost-panel

  misspell:
    locale: US

  gosec:
    excludes:
      - G104  # 未检查错误（由 errcheck 处理）
      - G304  # 文件路径来自变量（某些场景需要）
    severity: medium
    confidence: medium

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - experimental
      - opinionated
    disabled-checks:
      - whyNoLint
      - unnamedResult

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  stylecheck:
    checks: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]
    # ST1000: 包注释格式
    # ST1003: 驼峰命名检查（某些缩写词可能不符合）
    # ST1016: receiver 命名
    # ST1020: 注释格式
    # ST1021: 注释格式
    # ST1022: 注释格式

issues:
  exclude-rules:
    # 排除测试文件的某些检查
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - gocritic

    # 排除生成的代码
    - path: ".*\\.gen\\.go$"
      linters:
        - all

    # 排除 main 函数的某些检查
    - path: cmd/
      text: "G104:"
      linters:
        - gosec

    # 允许在某些情况下使用 fmt.Println
    - path: cmd/
      text: "use of `fmt.Println` forbidden"
      linters:
        - forbidigo

  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  uniq-by-line: true
  sort-results: true
